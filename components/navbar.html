<!-- Mobile Menu Overlay -->
<div id="mobile-menu-overlay" class="hidden fixed inset-0 bg-black/90 z-40 md:hidden transition-opacity duration-300"></div>

<!-- Mobile Menu Sidebar -->
<div id="mobile-menu" class="fixed top-0 right-0 h-screen w-64 bg-[#030303] border-l border-white/10 z-50 md:hidden transform translate-x-full transition-transform duration-300 overflow-y-auto">
    <div class="flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-white/10 sticky top-0 bg-[#030303] z-10">
            <span class="text-sm font-semibold text-white">Menú</span>
            <button id="mobile-menu-close" class="text-neutral-500 hover:text-white p-1">
                <iconify-icon icon="solar:close-circle-linear" class="text-2xl"></iconify-icon>
            </button>
        </div>
        <!-- Links -->
        <div class="px-6 py-6 flex flex-col gap-5">
            <a href="/#story" class="text-sm text-neutral-400 hover:text-white transition-colors">La historia</a>
            <a href="/#pricing" class="text-sm text-neutral-400 hover:text-white transition-colors">Planes y licencias</a>
            <a href="/#faq" class="text-sm text-neutral-400 hover:text-white transition-colors">¿Qué es TARDO?</a>
            
            <hr class="border-white/10 my-2">
            
            <!-- Mobile: Usuario NO autenticado -->
            <div id="mobile-nav-guest">
                <button onclick="openLoginModal()" class="flex items-center gap-3 text-sm text-neutral-400 hover:text-white transition-colors w-full text-left">
                    <iconify-icon icon="solar:login-3-linear" class="text-xl"></iconify-icon>
                    <span>Acceso</span>
                </button>
                <button onclick="openRegisterModal()" class="flex items-center gap-3 text-sm text-neutral-400 hover:text-white transition-colors w-full text-left mt-5">
                    <iconify-icon icon="solar:user-plus-linear" class="text-xl"></iconify-icon>
                    <span>Inscribirse</span>
                </button>
            </div>
            
            <!-- Mobile: Usuario autenticado -->
            <div id="mobile-nav-user" class="hidden flex-col gap-5">
                <a href="/user_panel/dashboard.html" class="flex items-center gap-3 text-sm text-neutral-400 hover:text-white transition-colors">
                    <iconify-icon icon="solar:user-circle-bold" class="text-xl"></iconify-icon>
                    <span id="mobile-user-name">Mi Perfil</span>
                </a>
                <button onclick="logout()" class="flex items-center gap-3 text-sm text-neutral-400 hover:text-white transition-colors w-full text-left">
                    <iconify-icon icon="solar:logout-2-linear" class="text-xl"></iconify-icon>
                    <span>Salir</span>
                </button>
            </div>
            
            <!-- Download Button (moved here, always visible) -->
            <a href="/descargas.html" class="flex items-center gap-3 p-4 mt-2 rounded-lg bg-emerald-500/5 border border-emerald-500/20 hover:bg-emerald-500/10 hover:border-emerald-500/30 transition-all">
                <iconify-icon icon="solar:download-linear" class="text-emerald-500 text-2xl flex-shrink-0"></iconify-icon>
                <div class="text-left">
                    <h4 class="text-white font-semibold text-sm mb-1">Descargar TARDO</h4>
                    <p class="text-xs text-neutral-400 leading-relaxed">Última versión: v3.0.1</p>
                </div>
            </a>
        </div>
    </div>
</div>

<script>
    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenuClose = document.getElementById('mobile-menu-close');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
    
    function openMenu() {
        mobileMenuOverlay.classList.remove('hidden');
        setTimeout(() => {
            mobileMenu.classList.remove('translate-x-full');
        }, 10);
    }
    
    function closeMenu() {
        mobileMenu.classList.add('translate-x-full');
        setTimeout(() => {
            mobileMenuOverlay.classList.add('hidden');
        }, 300);
    }
    
    mobileMenuBtn.addEventListener('click', openMenu);
    mobileMenuClose.addEventListener('click', closeMenu);
    mobileMenuOverlay.addEventListener('click', closeMenu);
    
    // Close menu when clicking links
    document.querySelectorAll('#mobile-menu a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });
    
    // Authentication state management
    function checkAuthState() {
        const token = localStorage.getItem('tardo_token');
        const userStr = localStorage.getItem('tardo_user');
        
        const navGuest = document.getElementById('nav-guest');
        const navUser = document.getElementById('nav-user');
        const mobileNavGuest = document.getElementById('mobile-nav-guest');
        const mobileNavUser = document.getElementById('mobile-nav-user');
        
        if (token && userStr) {
            try {
                const user = JSON.parse(userStr);
                const userName = user.name || user.email || 'Usuario';
                
                // Desktop: Ocultar guest, mostrar user
                if (navGuest) {
                    navGuest.classList.add('hidden');
                    navGuest.classList.remove('md:flex');
                }
                if (navUser) {
                    navUser.classList.remove('hidden');
                    navUser.classList.add('md:flex');
                }
                const navUserNameText = document.getElementById('nav-user-name-text');
                if (navUserNameText) navUserNameText.textContent = userName;
                
                // Mobile: Ocultar guest, mostrar user
                if (mobileNavGuest) mobileNavGuest.classList.add('hidden');
                if (mobileNavUser) {
                    mobileNavUser.classList.remove('hidden');
                    mobileNavUser.classList.add('flex');
                }
                const mobileUserName = document.getElementById('mobile-user-name');
                if (mobileUserName) mobileUserName.textContent = userName;
                
            } catch (e) {
                console.error('Error parsing user data:', e);
                logout();
            }
        } else {
            // Guest state: Mostrar guest, ocultar user
            if (navGuest) {
                navGuest.classList.remove('hidden');
                navGuest.classList.add('md:flex');
            }
            if (navUser) {
                navUser.classList.add('hidden');
                navUser.classList.remove('md:flex');
            }
            if (mobileNavGuest) mobileNavGuest.classList.remove('hidden');
            if (mobileNavUser) mobileNavUser.classList.add('hidden');
        }
    }
    
    function logout() {
        localStorage.removeItem('tardo_token');
        localStorage.removeItem('tardo_user');
        window.location.href = '/';
    }
    
    // Check auth state on load
    checkAuthState();
</script>
